<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheep Intelligence Dashboard</title>
    <style>
        :root {
            --pasture-green: #2ecc71;
            --deep-forest: #27ae60;
            --wool-white: #f9f9f9;
            --night-sky: #1a1a1a;
            --accent-gold: #f1c40f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--night-sky);
            color: var(--wool-white);
            overflow: hidden;
            height: 100vh;
        }

        /* Dashboard Layout */
        .container {
            display: grid;
            grid-template-columns: 250px 1fr;
            height: 100vh;
        }

        nav {
            background: rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--pasture-green);
            display: flex;
            align-items: center; gap: 10px;
        }

        main {
            padding: 40px;
            position: relative;
            z-index: 5;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* News Ticker - SLOWER */
        .ticker-wrap {
            position: fixed;
            top: 0;
            width: 100%;
            overflow: hidden;
            height: 40px;
            background-color: rgba(46, 204, 113, 0.2);
            border-bottom: 1px solid var(--pasture-green);
            z-index: 20;
            display: flex;
            align-items: center;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%;
            animation: ticker 180s linear infinite; /* Very slow (180s loop) */
            font-weight: bold;
            color: var(--pasture-green);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 100px;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .card h3 {
            margin: 0 0 15px 0;
            color: var(--pasture-green);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .stat { font-size: 2.5rem; font-weight: bold; }

        /* Animated Sheep - BACKGROUND & NO LEGS */
        .sheep-lane {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1; 
        }

        .sheep-container {
            position: absolute;
            font-size: 3rem;
        }

        @keyframes walkAcross {
            from { left: -150px; }
            to { left: 110vw; }
        }
    </style>
</head>
<body>
    <div class="ticker-wrap">
        <div class="ticker" id="news-ticker">
            <!-- Items injected by JS -->
        </div>
    </div>

    <div class="container" style="margin-top: 40px;">
        <nav>
            <div class="logo"><span>🐑</span> SHEEP-OS</div>
            <div style="margin-top:auto; font-size: 0.7rem; color: #555;">Version 2.3.0 - "Broadband Pasture"</div>
        </nav>
        <main>
            <header>
                <h1>Fleet Commander Dashboard</h1>
                <div id="clock" style="font-family: monospace; font-size: 1.2rem;"></div>
            </header>

            <div class="grid">
                <div class="card">
                    <h3>Active Flocks</h3>
                    <div class="stat">2,568</div>
                </div>
                <div class="card">
                    <h3>Wool Reserves</h3>
                    <div class="stat">85.6t</div>
                </div>
                <div class="card">
                    <h3>Grazing Efficiency</h3>
                    <div class="stat">99.9%</div>
                </div>
                <div class="card">
                    <h3>Top Commander</h3>
                    <div class="stat" style="font-size: 1.5rem; color: var(--accent-gold);">Kyber One</div>
                </div>
            </div>

            <div style="margin-top: 40px;" class="card">
                <h3>Tactical Pasture Map</h3>
                <div style="height: 300px; background: rgba(46, 204, 113, 0.05); border: 1px dashed var(--pasture-green); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #444;">
                    [ MASSIVE FLEET ONLINE ]
                </div>
            </div>
        </main>
    </div>

    <div class="sheep-lane" id="pasture"></div>

    <script>
        const newsItems = [
            "Baa-lliant intelligence gathered in the southern sector.",
            "Alert: High-quality clover detected at coordinates 42.9, -71.2.",
            "Ewe are authorized for maximum grazing efficiency.",
            "Wool market prices hit record highs this morning.",
            "New tactical sweaters deployed to the alpine division.",
            "Warning: Shearer activity detected in peripheral zones.",
            "Sheep of the month voting now open in the mess hall.",
            "Fleet density doubled. Commanders advised to maintain wool output.",
            "Sub-pasture 4 report: Clover levels optimal.",
            "Intelligence Report: Wolves in the area have been successfully bamboozled.",
            "Historical Fact: Sheep were among the first animals to be domesticated.",
            "Technological Breakthrough: Smart-wool 2.0 now available for elite units.",
            "Weather Update: Sunny with a 100% chance of grazing.",
            "Logistics: Shepherd dog reinforcements arriving at 0800 hours.",
            "Mandalorian Intelligence: Sheep are considered the most honorable grazers in the galaxy.",
            "Clover Supply Chain: North pasture restocked and ready.",
            "Internal Memo: Stop calling the Commander 'Baa-ss', even if it's funny.",
            "Training: Ramming speed practice scheduled for tomorrow at the ridge.",
            "Status: 100% Baa-lliant operations confirmed."
        ];

        function initTicker() {
            const ticker = document.getElementById('news-ticker');
            const items = [...newsItems, ...newsItems].map(text => `<div class="ticker-item">${text}</div>`).join('');
            ticker.innerHTML = items;
        }

        function spawnSheep() {
            const pasture = document.getElementById('pasture');
            const sheep = document.createElement('div');
            sheep.className = 'sheep-container';
            sheep.innerText = '🐑';
            
            const startY = 10 + (Math.random() * 80);
            const duration = 10 + (Math.random() * 20);
            
            sheep.style.top = startY + 'vh';
            sheep.style.animation = `walkAcross ${duration}s linear forwards`;
            
            pasture.appendChild(sheep);
            setTimeout(() => sheep.remove(), duration * 1000);
        }

        function updateClock() {
            const now = new Date();
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = now.toLocaleTimeString();
        }

        // Maintain double density
        setInterval(spawnSheep, 2000);
        setInterval(updateClock, 1000);
        
        initTicker();
        updateClock();
        for(let i=0; i<10; i++) setTimeout(spawnSheep, Math.random() * 5000);
    </script>
</body>
</html>
